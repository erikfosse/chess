# ============================================================
# HANDLERS - where log output goes
# ============================================================
# Use both console and file output (remove one if not needed)
handlers=java.util.logging.ConsoleHandler, java.util.logging.FileHandler

# ============================================================
# GLOBAL LEVEL - minimum level to log
# ============================================================
.level=FINE

# ============================================================
# CONSOLE HANDLER
# ============================================================
java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

# ============================================================
# FILE HANDLER
# ============================================================
java.util.logging.FileHandler.level=FINE
java.util.logging.FileHandler.pattern=logs/app%u.log   # %u = unique number to avoid conflicts
java.util.logging.FileHandler.limit=50000              # max file size in bytes
java.util.logging.FileHandler.count=5                  # number of rotating log files to keep
java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.FileHandler.append=true              # append to file instead of overwriting

# ============================================================
# FORMAT
# ============================================================
# date       time     class/method  level   message
# 2024-01-01 12:00:00 MyClass.myMethod INFO  Hello
java.util.logging.SimpleFormatter.format=%1$tF %1$tT %2$s %4$s %5$s%n

# ============================================================
# PER-CLASS LEVELS (override global level for specific classes)
# ============================================================
